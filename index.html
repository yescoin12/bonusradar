<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AU Casino Bonus Scanner — Live Results</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden}
body{background:#080810;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;height:100vh;width:100vw}
.wrap{width:100%;max-width:100%;height:100%;display:flex;flex-direction:column;margin:0 auto}
@media(min-width:600px){.wrap{max-width:500px;height:100vh}}
.topbar{border-radius:0;flex-shrink:0}
.scan-bar{flex-shrink:0}
.social-proof{flex-shrink:0}
.chat-area{flex:1;height:auto!important;overflow-y:auto;min-height:0}
.options-area{flex-shrink:0;border-radius:0}

/* TOP BAR */
.topbar{background:#0d0d1a;border:1px solid #1e1e3a;border-radius:14px 14px 0 0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}
.live-label{color:#22c55e;font-size:11px;font-weight:700;letter-spacing:1px}
.scanner-title{color:#8888aa;font-size:11px}
.slots-left{background:#1a0a0a;border:1px solid #ff4444;border-radius:6px;padding:4px 10px;font-size:11px;color:#ff6666;font-weight:600}

/* SCAN BAR */
.scan-bar{background:#0a0a18;border-left:1px solid #1e1e3a;border-right:1px solid #1e1e3a;padding:10px 16px;display:flex;align-items:center;gap:10px}
.scan-progress{flex:1;height:4px;background:#1e1e3a;border-radius:2px;overflow:hidden}
.scan-fill{height:100%;background:linear-gradient(90deg,#6c63ff,#e8b84b);border-radius:2px;width:0%;transition:width 0.3s}
.scan-text{color:#555577;font-size:11px;white-space:nowrap}

/* SOCIAL PROOF */
.social-proof{background:#0a0a18;border-left:1px solid #1e1e3a;border-right:1px solid #1e1e3a;padding:8px 16px;display:flex;align-items:center;gap:8px;border-top:1px solid #111128}
.avatars{display:flex}
.av{width:22px;height:22px;border-radius:50%;border:2px solid #080810;font-size:10px;display:flex;align-items:center;justify-content:center;margin-left:-6px;background:#2a2a4a;color:#8888cc}
.av:first-child{margin-left:0}
.social-text{color:#666688;font-size:11px}
.social-text span{color:#aaaacc;font-weight:600}

/* CHAT */
.chat-area{background:#0c0c1e;border-left:1px solid #1e1e3a;border-right:1px solid #1e1e3a;padding:16px;height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}

.msg{display:flex;align-items:flex-end;gap:8px}
.msg.user{justify-content:flex-end}
.bot-icon{width:28px;height:28px;border-radius:50%;background:#1e1e3a;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.bubble{max-width:80%;padding:10px 14px;font-size:13.5px;line-height:1.55}
.bubble.bot{background:#14142a;color:#d0d0e8;border-radius:4px 16px 16px 16px;border:1px solid #1e1e3a}
.bubble.user{background:#e8b84b;color:#0d0d0d;border-radius:16px 16px 4px 16px;font-weight:600}

/* BONUS CARD */
.bonus-card{background:#0f0f22;border:1px solid #2a2a5a;border-radius:12px;padding:14px;margin:4px 0}
.bonus-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bonus-badge{background:#e8b84b;color:#0d0d0d;font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:0.5px}
.bonus-verified{color:#22c55e;font-size:10px;display:flex;align-items:center;gap:4px}
.bonus-title{color:#e8e8ff;font-size:15px;font-weight:700;margin-bottom:4px}
.bonus-sub{color:#8888aa;font-size:12px;margin-bottom:10px}
.bonus-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat{background:#080818;border-radius:8px;padding:8px;text-align:center}
.stat-val{color:#e8b84b;font-size:14px;font-weight:700}
.stat-label{color:#555577;font-size:10px;margin-top:2px}

/* COUNTDOWN */
.countdown-wrap{background:linear-gradient(135deg,#1a0505,#120010);border:1px solid #ff3300;border-radius:14px;padding:14px 16px;margin:4px 0;position:relative;overflow:hidden}
.countdown-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,60,0,0.15),transparent 70%);pointer-events:none}
.cd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cd-label{color:#ff6644;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.cd-flame{font-size:14px;animation:flicker 0.8s infinite alternate}
@keyframes flicker{0%{opacity:1;transform:scale(1)}100%{opacity:.7;transform:scale(1.15)}}
.cd-urgency{background:#3a0800;border:1px solid #ff3300;border-radius:4px;padding:2px 8px;font-size:10px;color:#ff6644;font-weight:600}
.cd-timer{display:flex;align-items:center;justify-content:center;gap:8px}
.cd-block{display:flex;flex-direction:column;align-items:center;position:relative}
.cd-face{background:#0d0008;border:1px solid #440020;border-radius:10px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.cd-face::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,50,0,0.3)}
.cd-num{color:#ff4422;font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;text-shadow:0 0 20px rgba(255,68,34,0.8),0 0 40px rgba(255,68,34,0.4);line-height:1;transition:all 0.1s}
.cd-num.flip{transform:scaleY(0.1);opacity:0.3}
.cd-unit{color:#662222;font-size:9px;font-weight:700;letter-spacing:1px;margin-top:5px;text-transform:uppercase}
.cd-colon{color:#ff3300;font-size:26px;font-weight:800;margin-bottom:14px;animation:blink 1s infinite;text-shadow:0 0 10px rgba(255,51,0,0.6)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.cd-subtext{text-align:center;color:#662222;font-size:10px;margin-top:10px;letter-spacing:0.5px}

/* TYPING */
.typing{display:flex;gap:5px;align-items:center;padding:12px 16px;background:#14142a;border:1px solid #1e1e3a;border-radius:4px 16px 16px 16px;width:fit-content}
.tdot{width:6px;height:6px;border-radius:50%;background:#6c63ff;animation:tdots 1.2s infinite}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes tdots{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

/* OPTIONS */
.options-area{background:#0d0d1a;border:1px solid #1e1e3a;border-radius:0 0 14px 14px;padding:12px;display:flex;flex-direction:column;gap:7px}
.opt-btn{padding:11px 14px;border-radius:10px;border:1px solid #1e1e3a;background:#12121e;color:#c8c8e8;font-size:13.5px;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;display:flex;align-items:center;justify-content:space-between}
.opt-btn:hover{background:#1e1e3a;border-color:#6c63ff;color:#e8e8ff}
.opt-arr{color:#6c63ff;font-size:16px;opacity:0.6}

/* CTA */
.cta-section{display:flex;flex-direction:column;gap:8px;padding:4px 0}
.cta-btn{display:block;width:100%;padding:15px;background:#e8b84b;color:#0d0d0d;font-size:15px;font-weight:800;border:none;border-radius:12px;cursor:pointer;text-align:center;text-decoration:none;letter-spacing:0.3px;transition:background .15s}
.cta-btn:hover{background:#f5c842}
.cta-small{text-align:center;color:#444466;font-size:11px}
.cta-small span{color:#22c55e}

.disclaimer{text-align:center;font-size:10px;color:#333355;margin-top:10px;line-height:1.6}

/* SCANNING OVERLAY MSG */
.scan-msg{color:#6c63ff;font-size:12px;font-family:monospace}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="topbar-left">
      <div class="live-dot"></div>
      <div class="live-label">LIVE</div>
      <div class="scanner-title">AU Bonus Scanner v2.4</div>
    </div>
    <div class="slots-left" id="slots-left">⚡ 7 slots left today</div>
  </div>

  <div class="scan-bar">
    <div class="scan-progress"><div class="scan-fill" id="scan-fill"></div></div>
    <div class="scan-text" id="scan-text">Scanning 47 AU casinos...</div>
  </div>

  <div class="social-proof">
    <div class="avatars">
      <div class="av">JM</div><div class="av">TK</div><div class="av">AS</div><div class="av">+</div>
    </div>
    <div class="social-text"><span id="viewer-count">238</span> Aussies used this scanner today</div>
  </div>

  <div class="chat-area" id="chat"></div>
  <div class="options-area" id="options"></div>
</div>
<p class="disclaimer">18+ only · Gamble responsibly · GambleAware.org · Promotions subject to T&Cs</p>

<script>
const CPA_LINK = "https://www.pyh2pm4n.com/RR4SZM/BQTC91M/";
const CASINO = "Pokie Spins";

const QUESTIONS = [
  { id:"game", text:"What games do you play most?", options:["🎰 Pokies / Slots","♠️ Table Games","🏈 Sports & Racing","🎲 Everything"] },
  { id:"budget", text:"What's your usual starting deposit?", options:["💵 $20–$50","💰 $50–$150","🤑 $150+"] },
  { id:"device", text:"Where do you play most?", options:["📱 Mobile (phone)","💻 Desktop / Laptop","🔀 Both"] },
  { id:"priority", text:"What matters most to you in a casino?", options:["🎁 Big welcome bonus","⚡ Fast withdrawals","🔒 Safety & trust","🎮 Game variety"] },
];

let step = 0;
let answers = {};
const chat = document.getElementById("chat");
const optArea = document.getElementById("options");
let countdown = 14 * 60 + 37;

// Animate scan bar
let scanPct = 0;
const scanFill = document.getElementById("scan-fill");
const scanText = document.getElementById("scan-text");
const scanMsgs = ["Scanning 47 AU casinos...","Checking bonus terms...","Verifying withdrawal speeds...","Filtering AU-eligible offers...","Ranking by value score...","Done — 3 offers found ✓"];
let si = 0;
const scanInt = setInterval(()=>{
  scanPct = Math.min(scanPct + 2, 100);
  scanFill.style.width = scanPct + "%";
  if(scanPct % 20 === 0 && si < scanMsgs.length - 1){ si++; scanText.textContent = scanMsgs[si]; }
  if(scanPct >= 100){ clearInterval(scanInt); scanText.textContent = scanMsgs[scanMsgs.length-1]; }
},60);

// Viewer count flicker
setInterval(()=>{
  const el = document.getElementById("viewer-count");
  const n = parseInt(el.textContent);
  el.textContent = n + Math.floor(Math.random()*3) - 1;
}, 4000);

// Slots countdown
let slots = 7;
setInterval(()=>{
  if(slots > 2 && Math.random() > 0.7){
    slots--;
    document.getElementById("slots-left").textContent = "⚡ " + slots + " slots left today";
  }
}, 12000);

function scrollBot(){ chat.scrollTop = chat.scrollHeight; }

function addMsg(html, from, delay=0){
  return new Promise(res=>{
    setTimeout(()=>{
      const row = document.createElement("div");
      row.className = "msg " + from;
      if(from === "bot"){
        row.innerHTML = `<div class="bot-icon">🤖</div><div class="bubble bot">${html}</div>`;
      } else {
        row.innerHTML = `<div class="bubble user">${html}</div>`;
      }
      chat.appendChild(row);
      scrollBot();
      res();
    }, delay);
  });
}

function showTyping(){
  const row = document.createElement("div");
  row.className = "msg bot"; row.id = "typing";
  row.innerHTML = `<div class="bot-icon">🤖</div><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
  chat.appendChild(row); scrollBot();
}
function hideTyping(){ const t=document.getElementById("typing"); if(t) t.remove(); }

function showOptions(opts){
  optArea.innerHTML = "";
  opts.forEach(opt=>{
    const btn = document.createElement("button");
    btn.className = "opt-btn";
    btn.innerHTML = `<span>${opt}</span><span class="opt-arr">›</span>`;
    btn.onclick = ()=>handleAnswer(opt);
    optArea.appendChild(btn);
  });
}

function clearOptions(){ optArea.innerHTML = ""; }

function addBonusCard(){
  const row = document.createElement("div");
  row.className = "msg bot";
  row.innerHTML = `<div class="bot-icon">🤖</div><div class="bubble bot" style="padding:0;background:transparent;border:none;max-width:90%">
    <div class="bonus-card">
      <div class="bonus-card-header">
        <div class="bonus-badge">🏆 #1 RANKED TODAY</div>
        <div class="bonus-verified">✔ Verified AU</div>
      </div>
      <div class="bonus-title">${CASINO}</div>
      <div class="bonus-sub">Exclusive offer — not available via casino homepage</div>
      <div class="bonus-stats">
        <div class="stat"><div class="stat-val">100%</div><div class="stat-label">Match Bonus</div></div>
        <div class="stat"><div class="stat-val">$20</div><div class="stat-label">Min Deposit</div></div>
        <div class="stat"><div class="stat-val">4.9★</div><div class="stat-label">AU Rating</div></div>
      </div>
    </div>
  </div>`;
  chat.appendChild(row); scrollBot();
}

function addCountdown(){
  const row = document.createElement("div");
  row.className = "msg bot";
  row.id = "cd-row";
  row.innerHTML = `<div class="bot-icon">⏱</div><div class="bubble bot" style="padding:0;background:transparent;border:none;max-width:95%">
    <div class="countdown-wrap">
      <div class="cd-top">
        <div class="cd-label"><span class="cd-flame">🔥</span> THIS OFFER EXPIRES IN</div>
        <div class="cd-urgency">EXCLUSIVE RATE</div>
      </div>
      <div class="cd-timer">
        <div class="cd-block">
          <div class="cd-face"><div class="cd-num" id="cd-m">14</div></div>
          <div class="cd-unit">minutes</div>
        </div>
        <div class="cd-colon">:</div>
        <div class="cd-block">
          <div class="cd-face"><div class="cd-num" id="cd-s">37</div></div>
          <div class="cd-unit">seconds</div>
        </div>
      </div>
      <div class="cd-subtext">⚠ Once this timer hits zero, the bonus reverts to the standard rate</div>
    </div>
  </div>`;
  chat.appendChild(row); scrollBot();
  setInterval(()=>{
    if(countdown > 0){ countdown--; }
    const m = Math.floor(countdown/60);
    const s = countdown % 60;
    const em = document.getElementById("cd-m");
    const es = document.getElementById("cd-s");
    const newM = String(m).padStart(2,"0");
    const newS = String(s).padStart(2,"0");
    if(em && em.textContent !== newM){
      em.classList.add("flip");
      setTimeout(()=>{ em.textContent = newM; em.classList.remove("flip"); },100);
    }
    if(es && es.textContent !== newS){
      es.classList.add("flip");
      setTimeout(()=>{ es.textContent = newS; es.classList.remove("flip"); },100);
    }
  },1000);
}

function showCTA(aiText){
  clearOptions();
  addBonusCard();
  setTimeout(()=>{
    addMsg(aiText, "bot");
    setTimeout(()=>{
      addCountdown();
      setTimeout(()=>{
        const row = document.createElement("div");
        row.className = "msg bot";
        row.innerHTML = `<div class="bot-icon"></div><div style="width:100%">
          <div class="cta-section">
            <a href="${CPA_LINK}" target="_blank" class="cta-btn">🎰 Claim My Exclusive Bonus →</a>
            <div class="cta-small">🔒 Secure link &nbsp;·&nbsp; <span>✔ Only $20 to activate</span> &nbsp;·&nbsp; AU players only</div>
          </div>
        </div>`;
        chat.appendChild(row); scrollBot();
      }, 800);
    }, 600);
  }, 600);
}

function getPersonalisedMsg(){
  const game = answers.game || "";
  const budget = answers.budget || "";
  const device = answers.device || "";
  const priority = answers.priority || "";

  const gameMap = {
    "🎰 Pokies / Slots": "massive pokies library with 500+ AU-favourite titles",
    "♠️ Table Games": "premium live table games including blackjack, roulette and baccarat",
    "🏈 Sports & Racing": "deep sports and racing markets covering NRL, AFL, cricket and more",
    "🎲 Everything": "the most complete AU casino experience — pokies, tables, live dealers and sports all in one"
  };
  const budgetMap = {
    "💵 $20–$50": "their $20 minimum deposit is one of the lowest in AU — perfect for your budget",
    "💰 $50–$150": "your deposit gets a 100% match bonus, meaning you play with double your money from the start",
    "🤑 $150+": "at your deposit level you unlock their premium bonus tier — the highest value offer we found today"
  };
  const deviceMap = {
    "📱 Mobile (phone)": "Their mobile app is rated #1 for AU players — silky smooth on any phone",
    "💻 Desktop / Laptop": "The desktop experience is fully optimised — fast loads, zero lag",
    "🔀 Both": "Seamlessly syncs across mobile and desktop — your balance and bonuses follow you everywhere"
  };
  const priorityMap = {
    "🎁 Big welcome bonus": "Right now they're running their biggest welcome offer of 2026 — exclusively through this scanner",
    "⚡ Fast withdrawals": "Withdrawals via PayID clear in under 2 hours — fastest we've seen across all 47 AU casinos",
    "🔒 Safety & trust": "Fully Curacao licensed with 256-bit encryption and a verified AU player protection policy",
    "🎮 Game variety": "Over 1,200 games from the top providers — the widest selection available to AU players right now"
  };

  const g = gameMap[game] || "an incredible all-round AU casino experience";
  const b = budgetMap[budget] || "their $20 minimum deposit is one of the lowest in AU";
  const d = deviceMap[device] || "works perfectly across all devices";
  const p = priorityMap[priority] || "right now they're running their biggest offer of 2026";

  return `Our scanner just matched your profile against 47 live AU casinos and ${CASINO} scored #1 — they've got ${g} and ${b}. ${d}. ${p}, and with only a few exclusive slots remaining today, this is the window to jump in.`;
}

function handleAnswer(option){
  answers[QUESTIONS[step].id] = option;
  addMsg(option, "user");
  clearOptions();

  if(step < QUESTIONS.length - 1){
    step++;
    showTyping();
    setTimeout(()=>{
      hideTyping();
      addMsg(QUESTIONS[step].text, "bot");
      showOptions(QUESTIONS[step].options);
    }, 900);
  } else {
    showTyping();
    setTimeout(()=>{
      hideTyping();
      const msg = getPersonalisedMsg();
      showCTA(msg);
    }, 1800);
  }
}

// Boot sequence
setTimeout(()=>{
  addMsg("🔍 Scanning live AU casino bonuses... <span class='scan-msg' id='typing-scan'>found 47 casinos</span>", "bot");
  let dots = 0;
  const scanAnim = setInterval(()=>{
    const el = document.getElementById("typing-scan");
    if(el){ dots++; const msgs=["found 47 casinos","checking bonus terms...","verifying withdrawals...","filtering AU-only offers...","ranking by value..."]; el.textContent = msgs[dots % msgs.length]; }
  }, 700);
  setTimeout(()=>{
    clearInterval(scanAnim);
    hideTyping();
    addMsg("✅ Scan complete — <strong style='color:#e8b84b'>3 verified AU bonuses</strong> found. To match you with the best one, I need to ask you 4 quick questions.", "bot");
    setTimeout(()=>{
      addMsg(QUESTIONS[0].text, "bot");
      showOptions(QUESTIONS[0].options);
    }, 1000);
  }, 3500);
}, 800);
</script>
</body>
</html>
